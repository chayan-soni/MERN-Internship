<!DOCTYPE html>
<html>
<head>
    <title>Fetch API Demo</title>
</head>
<body>

<h1>Check Console</h1>

<script>
async function fetchUsers() {
    try {
        const response = await fetch(
            "http://localhost:3000/users"
        );

        const data = await response.json();

        console.log("API Response:");
        console.log(data);

    } catch(error) {
        console.error("Error:", error);
    }
}

fetchUsers();
</script>

</body>
</html>
